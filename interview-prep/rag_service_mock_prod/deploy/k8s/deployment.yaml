apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-service
  labels: { app: rag-service }
spec:
  replicas: 3                      # baseline; HPA scales beyond this
  selector:
    matchLabels: { app: rag-service }
  template:
    metadata:
      labels: { app: rag-service }
    spec:
      containers:
        - name: rag-service
          image: registry.example.com/rag-service:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef: { name: rag-config }
          env:
            - name: RAG_OPENAI_API_KEY     # secret, never in the image/config map
              valueFrom:
                secretKeyRef: { name: rag-secrets, key: openai_api_key }
          # Requests = scheduler guarantee; limits = blast-radius cap.
          resources:
            requests: { cpu: "250m", memory: "512Mi" }
            limits:   { cpu: "1",    memory: "1Gi" }
          # Liveness: restart a wedged process. Readiness: don't route until deps loaded.
          livenessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet: { path: /ready, port: 8000 }
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: rag-service
spec:
  selector: { app: rag-service }
  ports:
    - port: 80
      targetPort: 8000
  type: ClusterIP

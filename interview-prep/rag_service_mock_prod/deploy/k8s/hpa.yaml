apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: rag-service
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: rag-service
  minReplicas: 3
  maxReplicas: 20
  metrics:
    # CPU is the simple default. For an LLM-bound service, prefer a custom metric
    # like p95 latency or in-flight requests / QPS per pod (via Prometheus adapter),
    # because the bottleneck is usually waiting on the LLM, not local CPU.
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30   # react fast to traffic spikes
    scaleDown:
      stabilizationWindowSeconds: 300  # scale down slowly to avoid flapping
